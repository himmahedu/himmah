name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --platforms android himmah_build
          ls -la /tmp/himmah_build/android/app/

      - name: Copy source code
        run: |
          cd /tmp/himmah_build
          rm -rf lib pubspec.yaml assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/google-services.json android/app/ 2>/dev/null || true

      - name: Set compileSdk to 35
        run: |
          find /tmp/himmah_build/android -name "build.gradle*" -exec ls -la {} \;
          cd /tmp/himmah_build/android/app
          if [ -f build.gradle.kts ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' build.gradle.kts
            sed -i 's/id("org.jetbrains.kotlin.android")/id("org.jetbrains.kotlin.android")\n    id("com.google.gms.google-services")/' build.gradle.kts
          fi
          if [ -f build.gradle ]; then
            sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' build.gradle

          fi

      - name: Add Google Services classpath
        run: |
          cd /tmp/himmah_build/android
          if [ -f build.gradle.kts ]; then
            sed -i 's/dependencies {/dependencies {\n        classpath("com.google.gms:google-services:4.4.0")/' build.gradle.kts
          fi

      - name: Build APK
        run: |
          cd /tmp/himmah_build
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/himmah_build/build/app/outputs/flutter-apk/app-release.apk