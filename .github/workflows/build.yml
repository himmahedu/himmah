name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create new Flutter project
        run: |
          cd /tmp
          flutter create -t app himmah_build
          cd himmah_build
          # Remove default lib and pubspec
          rm -rf lib pubspec.yaml
          # Copy your code
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          # Copy google-services.json
          cp $GITHUB_WORKSPACE/google-services.json android/app/ 2>/dev/null || true

      - name: Add google-services plugin
        working-directory: /tmp/himmah_build
        run: |
          # Add plugin to build.gradle.kts
          sed -i 's/id("org.jetbrains.kotlin.android")/id("org.jetbrains.kotlin.android")\n    id("com.google.gms.google-services")/' android/app/build.gradle.kts
          # Add classpath
          sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.0"/' android/build.gradle.kts

      - name: Build APK
        working-directory: /tmp/himmah_build
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/himmah_build/build/app/outputs/flutter-apk/app-release.apk