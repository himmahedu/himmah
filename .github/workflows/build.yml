name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --platforms android himmah_build
          cd himmah_build
          rm -rf lib pubspec.yaml assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/google-services.json android/app/ 2>/dev/null || true

      - name: Add Google Services to build.gradle.kts
        run: |
          cd /tmp/himmah_build/android/app
          cat build.gradle.kts | sed 's/id("org.jetbrains.kotlin.android")/id("org.jetbrains.kotlin.android")\n    id("com.google.gms.google-services")/' > tmp.kts && mv tmp.kts build.gradle.kts

      - name: Add Google Services classpath to build.gradle.kts
        run: |
          cd /tmp/himmah_build/android
          cat build.gradle.kts | sed 's/dependencies {/dependencies {\n        classpath("com.google.gms:google-services:4.4.0")/' > tmp.kts && mv tmp.kts build.gradle.kts

      - name: Build APK
        run: |
          cd /tmp/himmah_build
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/himmah_build/build/app/outputs/flutter-apk/app-release.apk