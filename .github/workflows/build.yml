name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create new Flutter project
        run: |
          cd /tmp
          flutter create -t app himmah_build
          cd himmah_build
          rm -rf lib pubspec.yaml
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/google-services.json android/app/ 2>/dev/null || true

      - name: Setup Android project
        run: |
          cd /tmp/himmah_build
          cp android/app/build.gradle.kts android/app/build.gradle.kts.bak
          cat android/app/build.gradle.kts.bak | sed 's/id("org.jetbrains.kotlin.android")/id("org.jetbrains.kotlin.android")\n    id("com.google.gms.google-services")/' > android/app/build.gradle.kts
          cp android/build.gradle.kts android/build.gradle.kts.bak
          cat android/build.gradle.kts.bak | sed 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.0"/' > android/build.gradle.kts

      - name: Build APK
        run: |
          cd /tmp/himmah_build
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/himmah_build/build/app/outputs/flutter-apk/app-release.apk